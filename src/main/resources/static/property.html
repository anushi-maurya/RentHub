<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f7fa;">

<div class="container mt-5" id="property-container">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const propertyId = params.get("id");

fetch("/api/properties/" + propertyId)
.then(res => res.json())
.then(p => {
	window.currentProperty = p;

    const imageUrl = p.imageName
        ? "/uploads/" + p.imageName
        : "https://via.placeholder.com/800x400";

    const html = `
    <div class="card shadow">
        <img src="${imageUrl}" class="card-img-top" style="height:400px; object-fit:cover;">

        <div class="card-body">
            <h3>${p.title}</h3>
            <p class="text-muted">${p.city}, ${p.area}</p>

            <h4 style="font-weight:600;">
                ₹${Number(p.rent).toLocaleString()}
                <span style="font-size:16px; color:gray;">per month</span>
            </h4>

            <hr>

            <p><strong>Type:</strong> ${p.type}</p>
            <p><strong>Furnished:</strong> ${p.furnished}</p>
            <p><strong>Gender:</strong> ${p.gender}</p>

            <hr>

            <h5>Description</h5>
            <p>${p.description}</p>

            <hr>

            <h5>Owner Contact</h5>
            <p><strong>Name:</strong> ${p.owner?.name || "N/A"}</p>

            <button class="btn btn-success mt-2"
                    onclick="showPhone('${p.owner?.phone || ''}')">
                Contact Owner
            </button>

            <p id="phoneBox" class="mt-2" style="display:none; font-weight:bold;"></p>
            <button class="btn btn-primary mt-2" onclick="sendRequest()">
            Send Rental Request
        </button>
        <p id="requestMsg" class="mt-2"></p>
            <a href="/tenant.html" class="btn btn-secondary mt-3">
                Back to Listings
            </a>
        </div>
    </div>
    `;

    document.getElementById("property-container").innerHTML = html;
});
function showPhone(phone) {
    if (!phone) {
        alert("Owner phone not available");
        return;
    }

    const box = document.getElementById("phoneBox");
    box.style.display = "block";
    box.innerText = "Phone: " + phone;
}

function sendRequest() {
    const token = localStorage.getItem("token");
    const tenantId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");
    const ownerId = window.currentProperty?.owner?.id;
    
    if (role === "OWNER") {
        alert("Owners cannot send rental requests!");
        return;
    }

    
    if (tenantId == ownerId) {
        alert("You cannot send a request to your own property!");
        return;
    }

    console.log("currentProperty:", window.currentProperty);
    console.log("ownerId:", ownerId);
    console.log("tenantId:", tenantId);

    if (!tenantId) {
        alert("Please login as tenant first");
        return;
    }

    if (!ownerId) {
        alert("Owner ID not found. Cannot send request.");
        return;
    }

    fetch("/api/requests", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            propertyId: propertyId,
            tenantId: tenantId,
            ownerId: ownerId
        })
    })
    .then(res => {
        if (!res.ok) {
            return res.text().then(msg => {
                document.getElementById("requestMsg").innerHTML =
                    "<span class='text-warning'>⚠️ " + msg + "</span>";
            });
        }
        return res.json().then(data => {
            document.getElementById("requestMsg").innerHTML =
                "<span class='text-success'>✅ Request sent! Status: " + data.status + "</span>";
        });
    })
    .catch(err => {
        document.getElementById("requestMsg").innerHTML =
            "<span class='text-danger'>❌ Failed to send request</span>";
    });
}
</script>

</body>
</html>
