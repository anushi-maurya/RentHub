<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <title>Register - RentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<div class="container mt-5" style="max-width:400px;">
    <h3 class="text-center">Register</h3>

    <input type="text" id="name" class="form-control mt-3" placeholder="Name" required>
    <input type="email" id="email" class="form-control mt-3" placeholder="Email" required>
    
   <div class="position-relative mt-3">
    <input type="password" id="password" class="form-control" placeholder="Password" required>
    <span onclick="togglePassword()" id="toggleIcon" class="bi bi-eye-slash" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#555; font-size:1.1rem;"></span>
</div>

    <input type="text" id="phone" class="form-control mt-3" placeholder="Phone" required>
    <select id="role" class="form-control mt-3">
    <option value="OWNER">Owner</option>
    <option value="TENANT">Tenant</option>
     </select>
       
    <button class="btn btn-success w-100 mt-3" onclick="register()">Register</button>

    <p class="text-center mt-3">
        Already have an account?
        <a href="/login.html">Login</a>
    </p>
</div>

<script>

async function register() {
	function togglePassword() {
	    const field = document.getElementById("password");
	    const icon = document.getElementById("toggleIcon");
	    if (field.type === "password") {
	        field.type = "text";
	        icon.classList.remove("bi-eye-slash");
	        icon.classList.add("bi-eye");
	    } else {
	        field.type = "password";
	        icon.classList.remove("bi-eye");
	        icon.classList.add("bi-eye-slash");
	    }
	}
	
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const phone    = document.getElementById("phone").value.trim();
    const role     = document.getElementById("role").value;

    // Validation
    if (!name || !email || !password || !phone) {
        alert("Please fill all fields!");
        return;
    }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        alert("Please enter a valid email address!");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters!");
        return;
    }

    if (phone.length < 10) {
        alert("Please enter a valid phone number!");
        return;
    }

    const user = { name, email, password, phone, role };

    const response = await fetch("/api/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
    });

    if (response.ok) {
        alert("Registration successful! Please login.");
        window.location.href = "/login.html";
    } else {
        alert("Registration failed. Email may already be registered.");
    }
}
</script>

</body>
</html>
