<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <title>Login - RentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<div class="container mt-5" style="max-width:400px;">
    <h3 class="text-center">Login</h3>

    <input type="email" id="email" class="form-control mt-3" placeholder="Email" required>
    
    <div class="position-relative mt-3">
    <input type="password" id="password" class="form-control" placeholder="Password" required>
    <span onclick="togglePassword()" id="toggleIcon" class="bi bi-eye-slash" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#555; font-size:1.1rem;"></span>
</div>
    
    <button type="button" class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
    
    <p class="text-center mt-3">
        Don’t have an account?
        <a href="/register.html">Register</a>
    </p>
</div>


<script>

function togglePassword() {
    const field = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");
    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        field.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);
        localStorage.setItem("ownerId", data.id);
        localStorage.setItem("userId", data.id);
        
        
        alert("Login successful!");

        if (data.role === "OWNER") {
            window.location.href = "/owner.html";
        } else {
            window.location.href = "/tenant.html";
        }
    } else {
        alert(data.error || "Login failed");
    }
}
</script>



</body>
</html>
