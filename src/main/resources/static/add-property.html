<!DOCTYPE html>
<html>
<head>
    <title>Add Property</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width:600px;">
    <h3>Add Property</h3>

    <input class="form-control mt-2" placeholder="Title" id="title">
    <input class="form-control mt-2" placeholder="Type (ROOM/PG/FLAT)" id="type">
    <input class="form-control mt-2" placeholder="City" id="city">
    <input class="form-control mt-2" placeholder="Area" id="area">
    <input class="form-control mt-2" placeholder="Rent" id="rent">
    <input class="form-control mt-2" placeholder="Furnished (YES/NO)" id="furnished">
    <input class="form-control mt-2" placeholder="Gender" id="gender">
    <textarea class="form-control mt-2" placeholder="Description" id="description"></textarea>

    <!-- Image upload input -->
    <input class="form-control mt-2" type="file" id="image" accept="image/*">

    <button class="btn btn-success mt-3" onclick="addProperty()">Add Property</button>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "/login.html";
}

function addProperty() {
    const title       = document.getElementById("title").value.trim();
    const type        = document.getElementById("type").value.trim();
    const city        = document.getElementById("city").value.trim();
    const area        = document.getElementById("area").value.trim();
    const rent        = document.getElementById("rent").value.trim();
    const furnished   = document.getElementById("furnished").value.trim();
    const gender      = document.getElementById("gender").value.trim();
    const description = document.getElementById("description").value.trim();
    const imageFile   = document.getElementById("image").files[0];

    // Validation
    if (!title || !type || !city || !area || !rent || !furnished || !gender || !description) {
        alert("Please fill all fields!");
        return;
    }

    if (isNaN(rent) || Number(rent) <= 0) {
        alert("Please enter a valid rent amount!");
        return;
    }

    if (!["ROOM", "PG", "FLAT"].includes(type.toUpperCase())) {
        alert("Type must be ROOM, PG or FLAT!");
        return;
    }

    if (!["YES", "NO"].includes(furnished.toUpperCase())) {
        alert("Furnished must be YES or NO!");
        return;
    }

    if (!imageFile) {
        alert("Please select a property image!");
        return;
    }

    const ownerId = localStorage.getItem("userId");
    const formData = new FormData();
    formData.append("title",       title);
    formData.append("type",        type.toUpperCase());
    formData.append("city",        city);
    formData.append("area",        area);
    formData.append("rent",        rent);
    formData.append("furnished",   furnished.toUpperCase());
    formData.append("gender",      gender);
    formData.append("description", description);
    formData.append("image",       imageFile);

    fetch("/api/properties/addWithImage/" + ownerId, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        alert("Property Added Successfully!");
        window.location.href = "/owner.html";
    })
    .catch(err => {
        alert("Error adding property");
        console.error(err);
    });
}
</script>

</body>
</html>
