<!DOCTYPE html>
<html>
<head>
    <title>RentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h1 class="text-center">RentHub - Rooms, PG & Flats</h1>

    <div class="row mt-4" id="propertyList">
        <!-- Cards will be added here by JavaScript -->
    </div>
    <div class="d-flex justify-content-end mt-3">
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</div>
    
</div>

<script>
fetch("http://localhost:8080/api/properties")
.then(response => response.json())
.then(data => {
    let cards = "";

    data.forEach(p => {
        cards += `
        <div class="col-md-4">
            <div class="card mb-3">
                <img 
                  src="${p.imageName ? 'http://localhost:8080/uploads/' + p.imageName : 'https://via.placeholder.com/300'}"
                  class="card-img-top"
                  height="200">
                <div class="card-body">
                    <h5 class="card-title">${p.title}</h5>
                    <p class="card-text">${p.city} - ₹${p.rent}</p>
                    <p class="card-text"><small class="text-muted">${p.type}</small></p>
                </div>
            </div>
        </div>
        `;
    });

    document.getElementById("propertyList").innerHTML = cards;
});
    
    function logout() {
        localStorage.removeItem("token");
        alert("Logged out successfully");
        window.location.href = "/login.html";
    }
   
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        window.location.href = "/login.html";
    }


</script>


</body>
</html>
