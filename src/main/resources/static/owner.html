<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Owner Dashboard - RentHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .property-img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }

        .status-active {
            background: #28a745;
        }

        .status-booked {
            background: #dc3545;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">RentHub</h4>
            <a href="#">Dashboard</a>
            <a href="/add-property.html">Add Property</a>
            <a href="#" onclick="showRequests()">Rental Requests</a>
            <a href="/edit-profile.html">Edit Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>

        <!-- Main content -->
        <div class="col-md-10">

            <div class="container mt-4">
                <div class="d-flex justify-content-between">
                    <h3>My Properties</h3>
                    <a href="/add-property.html" class="btn btn-success">
                        + Add Property
                    </a>
                </div>

                <div class="row mt-4" id="property-list"></div>
                <div class="container mt-4" id="requests-section" style="display:none;">
    <h3>Rental Requests</h3>
    <div id="requests-list" class="mt-3"></div>
</div>
            </div>

        </div>
    </div>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "/login.html";
}

// Validate token on page load
fetch("/api/properties", {
    headers: { "Authorization": "Bearer " + token }
})
.then(res => {
    if (res.status === 401 || res.status === 403) {
        // Token expired - force logout
        localStorage.clear();
        alert("Session expired. Please login again.");
        window.location.href = "/login.html";
    }
});
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}

fetch("/api/properties", {
    headers: {
        "Authorization": "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {
    let cards = "";

    data.forEach(p => {

        const statusClass = p.status === "BOOKED"
            ? "status-booked"
            : "status-active";

        const imageUrl = p.imageName
            ? "/uploads/" + p.imageName
            : "https://via.placeholder.com/400x200";

        cards += `
        <div class="col-md-4 mb-4">
            <div class="card">

                <img src="${imageUrl}" class="property-img">

                <div class="p-3">
                    <div class="d-flex justify-content-between">
                        <h5>${p.title}</h5>
                        <span class="badge ${statusClass}">
                            ${p.status || "ACTIVE"}
                        </span>
                    </div>

                    <p class="text-muted">${p.city}, ${p.area}</p>

                    <div>
                        <p style="font-size:22px; font-weight:600; margin:0;">
                            ₹${Number(p.rent).toLocaleString()}
                        </p>
                        <span style="color:gray; font-size:14px;">
                            per month
                        </span>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-primary btn-sm"
                            onclick="editProperty(${p.id})">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteProperty(${p.id})">
                            Delete
                        </button>
                    </div>
                </div>

            </div>
        </div>`;
    });

    document.getElementById("property-list").innerHTML = cards;
});

function editProperty(id) {
    window.location.href = "/edit-property.html?id=" + id;
}

function deleteProperty(id) {
    fetch("/api/properties/" + id, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(() => {
        alert("Property deleted");
        location.reload();
    });
}

function showRequests() {
    document.getElementById("requests-section").style.display = "block";

    const ownerId = localStorage.getItem("ownerId");

    fetch("/api/requests/owner/" + ownerId, {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(requests => {
        if (requests.length === 0) {
            document.getElementById("requests-list").innerHTML =
                "<p class='text-muted'>No rental requests yet.</p>";
            return;
        }

        // Fetch tenant details for each request
        const tenantFetches = requests.map(r =>
            fetch("/api/users/" + r.tenantId, {
                headers: { "Authorization": "Bearer " + token }
            })
            .then(res => res.json())
            .then(tenant => {
                r.tenantName  = tenant.name;
                r.tenantPhone = tenant.phone;
                return r;
            })
        );

        // Wait for all tenant details to load then display
        Promise.all(tenantFetches).then(requestsWithTenants => {
            let html = "";
            requestsWithTenants.forEach(r => {
                const badgeColor =
                    r.status === "APPROVED" ? "success" :
                    r.status === "REJECTED" ? "danger" : "warning";

                html += `
                <div class="card mb-3 p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">Property ID: ${r.propertyId}</h6>
                            <p class="mb-1"><strong>Tenant Name:</strong> ${r.tenantName || "N/A"}</p>
                            <p class="mb-1"><strong>Tenant Phone:</strong> ${r.tenantPhone || "N/A"}</p>
                            <small class="text-muted">Request ID: ${r.id}</small>
                        </div>
                        <span class="badge bg-${badgeColor}">${r.status}</span>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-success btn-sm"
                            onclick="approveRequest(${r.id})">Approve</button>
                        <button class="btn btn-danger btn-sm"
                            onclick="rejectRequest(${r.id})">Reject</button>
                    </div>
                </div>`;
            });

            document.getElementById("requests-list").innerHTML = html;
        });
    });
}

function approveRequest(id) {
    fetch("/api/requests/" + id + "/approve", {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    })
    .then(() => {
        showRequests();
    });
}

function rejectRequest(id) {
    fetch("/api/requests/" + id + "/reject", {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
    })
    .then(() => {
        showRequests();
    });
}
</script>

</body>
</html>
