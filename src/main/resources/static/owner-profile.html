<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Profile - RentHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .profile-container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-field {
            margin-bottom: 15px;
        }

        .profile-field label {
            font-weight: bold;
        }

        .profile-field p {
            margin: 5px 0 0 0;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>RentHub - Owner Profile</h1>
</div>

<div class="profile-container">
    <h2>My Profile</h2>

    <div class="profile-field">
        <label>Name:</label>
        <p id="name"></p>
    </div>

    <div class="profile-field">
        <label>Email:</label>
        <p id="email"></p>
    </div>

    <div class="profile-field">
        <label>Phone:</label>
        <p id="contact"></p>
    </div>

    <button onclick="goToEdit()">Edit Profile</button>
</div>

<script>

    // 🔹 Change this ID dynamically later (from login/session)
    const userId = localStorage.getItem("userId");

    fetch(`http://localhost:8080/api/users/${userId}`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("name").innerText = data.name;
            document.getElementById("email").innerText = data.email;
            document.getElementById("phone").innerText = data.contact || "Not Provided";
        })
        .catch(error => {
            console.error("Error fetching profile:", error);
        });

    function goToEdit() {
        window.location.href = "edit-profile.html";
    }

</script>

</body>
</html>
