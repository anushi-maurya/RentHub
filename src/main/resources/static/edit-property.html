<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edit Property</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width:600px;">
    <h3>Edit Property</h3>

    <input class="form-control mt-2" id="title" placeholder="Title">
    <input class="form-control mt-2" id="type" placeholder="Type">
    <input class="form-control mt-2" id="city" placeholder="City">
    <input class="form-control mt-2" id="area" placeholder="Area">
    <input class="form-control mt-2" id="rent" placeholder="Rent">
    <input class="form-control mt-2" id="furnished" placeholder="Furnished">
    <input class="form-control mt-2" id="gender" placeholder="Gender">
    <textarea class="form-control mt-2" id="description" placeholder="Description"></textarea>

    <button class="btn btn-success mt-3" onclick="updateProperty()">Update Property</button>
</div>

<script>
const token = localStorage.getItem("token");

if (!token) {
    alert("Please login first");
    window.location.href = "/login.html";
}

const params = new URLSearchParams(window.location.search);
const propertyId = params.get("id");

// Load property data
fetch("/api/properties", {
    headers: {
        "Authorization": "Bearer " + token
    }
})
.then(res => res.json())
.then(data => {
    const property = data.find(p => p.id == propertyId);

    if (property) {
        title.value = property.title;
        type.value = property.type;
        city.value = property.city;
        area.value = property.area;
        rent.value = property.rent;
        furnished.value = property.furnished;
        gender.value = property.gender;
        description.value = property.description;
    }
});

function updateProperty() {
    const updated = {
        title: title.value,
        type: type.value,
        city: city.value,
        area: area.value,
        rent: rent.value,
        furnished: furnished.value,
        gender: gender.value,
        description: description.value
    };

    fetch("/api/properties/update/" + propertyId, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(updated)
    })
    .then(() => {
        alert("Property updated!");
        window.location.href = "/owner.html";
    });
}
</script>

</body>
</html>
